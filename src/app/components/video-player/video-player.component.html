<div class="player-shell">

  <!-- ── Video area ──────────────────────────────────────────────────── -->
  <div class="video-area">
    <video #videoEl class="video-el" preload="auto" (ended)="onVideoEnded()"></video>

    @if (!isPlaying() && clip()) {
      <button class="play-overlay" (click)="togglePlay()" aria-label="Play">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="6,3 20,12 6,21"/>
        </svg>
      </button>
    }

    @if (clip()) {
      <div class="time-overlay">{{ formatTime(currentTime()) }} / {{ formatTime(duration()) }}</div>
    }
  </div>

  @if (clip()) {

    <!-- ── Controls bar ────────────────────────────────────────────────── -->
    <div class="controls-bar">
      <div class="controls-left">

        <button class="ctrl-btn" (click)="skipBack()" aria-label="Skip back 5 seconds">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <rect x="5" y="5" width="2.5" height="14" rx="1"/>
            <polygon points="18,5 9,12 18,19"/>
          </svg>
        </button>

        <button class="ctrl-btn ctrl-btn--play" (click)="togglePlay()"
                [attr.aria-label]="isPlaying() ? 'Pause' : 'Play'">
          @if (isPlaying()) {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <rect x="5" y="4" width="4" height="16" rx="1"/>
              <rect x="15" y="4" width="4" height="16" rx="1"/>
            </svg>
          } @else {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="6,3 20,12 6,21"/>
            </svg>
          }
        </button>

        <button class="ctrl-btn" (click)="skipForward()" aria-label="Skip forward 5 seconds">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <rect x="16.5" y="5" width="2.5" height="14" rx="1"/>
            <polygon points="6,5 15,12 6,19"/>
          </svg>
        </button>

        <button class="ctrl-btn btn-mute" (click)="toggleMute()"
                [attr.aria-label]="isMuted() ? 'Unmute' : 'Mute'">
          <span class="vol-dot" [class.vol-dot--on]="!isMuted() && volume() > 0"></span>
          @if (isMuted() || volume() === 0) {
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
          } @else {
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
          }
        </button>

        <input
          type="range"
          class="volume-slider"
          min="0" max="1" step="0.02"
          [value]="volume()"
          (input)="onVolumeChange($event)"
          aria-label="Volume"
        />
      </div>

  <div class="controls-right">
        <label class="speed-label" for="speed-select">Speed</label>
        <select id="speed-select" class="speed-select" [value]="playbackRate()" (change)="onSpeedChange($event)">
          @for (speed of speeds; track speed) {
            <option [value]="speed" [selected]="playbackRate() === speed">{{ speed }}×</option>
          }
        </select>
      </div>
    </div>

  }
</div>
