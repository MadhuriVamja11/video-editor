<div class="player-shell">

  <div class="video-area">
    <video #videoEl class="video-el" preload="auto" (ended)="onVideoEnded()"></video>

    @if (!isPlaying() && clip()) {
      <button class="play-overlay" (click)="togglePlay()" aria-label="Play">
        <img src="icons/play.svg" width="24" height="24" alt="" />
      </button>
    }

    @if (clip()) {
      <div class="time-overlay">{{ formatTime(currentTime()) }} / {{ formatTime(duration()) }}</div>
    }
  </div>

  @if (clip()) {

    <div class="controls-bar">
      <div class="controls-left">

        <button class="ctrl-btn" (click)="skipBack()" aria-label="Skip back 5 seconds">
          <img src="icons/skip-back.svg" width="16" height="16" alt="" />
        </button>

        <button class="ctrl-btn ctrl-btn--play" (click)="togglePlay()"
                [attr.aria-label]="isPlaying() ? 'Pause' : 'Play'">
          @if (isPlaying()) {
            <img src="icons/pause.svg" width="18" height="18" alt="" />
          } @else {
            <img src="icons/play.svg" width="18" height="18" alt="" />
          }
        </button>

        <button class="ctrl-btn" (click)="skipForward()" aria-label="Skip forward 5 seconds">
          <img src="icons/skip-forward.svg" width="16" height="16" alt="" />
        </button>

        <button class="ctrl-btn btn-mute" (click)="toggleMute()"
                [attr.aria-label]="isMuted() ? 'Unmute' : 'Mute'">
          <span class="vol-dot" [class.vol-dot--on]="!isMuted() && volume() > 0"></span>
          @if (isMuted() || volume() === 0) {
            <img src="icons/volume-mute.svg" width="16" height="16" alt="" />
          } @else {
            <img src="icons/volume.svg" width="16" height="16" alt="" />
          }
        </button>

        <input
          type="range"
          class="volume-slider"
          min="0" max="1" step="0.02"
          [value]="volume()"
          (input)="onVolumeChange($event)"
          aria-label="Volume"
        />
      </div>

      <div class="controls-right">
        <label class="speed-label" for="speed-select">Speed</label>
        <select id="speed-select" class="speed-select" [value]="playbackRate()" (change)="onSpeedChange($event)">
          @for (speed of speeds; track speed) {
            <option [value]="speed" [selected]="playbackRate() === speed">{{ speed }}×</option>
          }
        </select>
      </div>
    </div>

  }
</div>
