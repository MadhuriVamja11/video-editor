<div class="timeline">
  <div class="timeline-inner">

    <!-- Left-side row labels -->
    <div class="label-col">
      <div class="ruler-spacer"></div>
      <div class="row-label">Video</div>
      <div class="row-label">Audio</div>
    </div>

    <!-- Scrollable measure area — click anywhere to seek -->
    <div class="measure" (click)="onTimelineClick($event)">

      <!-- Time ruler -->
      <div class="ruler">
        @for (tick of ticks(); track tick.label) {
          <span class="tick" [style.left.%]="tick.pct">{{ tick.label }}</span>
        }
      </div>

      <!-- Video clip block -->
      <div class="track">
        <div class="clip-block">
          @for (pct of frameMarkers; track pct) {
            <div class="frame-line" [style.left.%]="pct"></div>
          }
          <span class="clip-name">{{ clip()?.file?.name }}</span>
        </div>
      </div>

      <!-- Audio waveform (rendered by WaveSurfer) -->
      <div class="audio-track">
        <div #waveformRef class="waveform"></div>
      </div>

      <!-- Red playhead line -->
      <div class="playhead" [style.left.%]="playheadPct()">
        <div class="playhead-triangle"></div>
        <div class="playhead-line"></div>
      </div>

    </div>
  </div>
</div>
