@if (clip()) {
  <div class="timeline">

    <div class="labels-col">
      <div class="ruler-spacer"></div>
      <div class="track-label">Video</div>
      <div class="track-label">Audio</div>
    </div>

    <div class="tracks-col" #tracksCol (click)="onTrackClick($event)">

      <!-- Time ruler -->
      <div class="ruler">
        @for (mark of timeMarks(); track mark.time) {
          <div class="ruler-mark" [style.left.%]="mark.left">
            <div class="ruler-tick"></div>
            <span class="ruler-label">{{ formatTime(mark.time) }}</span>
          </div>
        }
      </div>

      <!-- Video track: filmstrip thumbnails -->
      <div class="track-body video-track">
        @for (thumb of thumbnails(); track $index) {
          <img class="thumb" [src]="thumb" alt="" />
        } @empty {
          <div class="track-empty">Loading…</div>
        }
      </div>

      <!-- Audio track: WaveSurfer waveform -->
      <div class="track-body audio-track" #waveformContainer></div>

      <!-- Grey overlay: region before trim start -->
      <div class="trim-overlay"
           [style.left]="'0'"
           [style.width.%]="trimStartPct()"></div>

      <!-- Grey overlay: region after trim end -->
      <div class="trim-overlay"
           [style.left.%]="trimEndPct()"
           [style.width.%]="100 - trimEndPct()"></div>

      <!-- Left trim handle (drag to set start) -->
      <div class="trim-handle trim-handle--left"
           [style.left.%]="trimStartPct()"
           (mousedown)="startTrimDrag($event, 'start')"></div>

      <!-- Right trim handle (drag to set end) -->
      <div class="trim-handle trim-handle--right"
           [style.left.%]="trimEndPct()"
           (mousedown)="startTrimDrag($event, 'end')"></div>

      <!-- Playhead -->
      <div class="playhead" [style.left.%]="playheadPct()"></div>

    </div>

  </div>
}
