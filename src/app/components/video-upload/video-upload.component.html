<div
  class="clips-panel"
  cdkDropList
  (cdkDropListDropped)="drop($event)"
>

  @for (c of clips(); track c.url; let i = $index) {
    <div class="clip-card-wrapper" cdkDrag>

      <button
        class="clip-card"
        [class.clip-card--active]="activeIndex() === i"
        (click)="selectClip(i)"
        [attr.aria-label]="'Play ' + c.file.name"
      >
        <div class="clip-preview">
          @if (c.thumbnail) {
            <img [src]="c.thumbnail" alt="" class="clip-thumb" />
          } @else {
            <img src="icons/film.svg" class="clip-icon" width="28" height="28" alt="" />
          }
          <span class="clip-index">{{ i + 1 }}</span>
        </div>
        <div class="clip-info">
          <p class="clip-name">{{ c.file.name }}</p>
          <p class="clip-dur">{{ formatTime(c.duration) }}</p>
        </div>
      </button>

      <button
        class="clip-remove"
        (click)="removeClip($event, i)"
        aria-label="Remove clip"
        title="Remove clip"
      >
        <img src="icons/close.svg" width="10" height="10" alt="" />
      </button>

      <div class="clip-drag-handle">
        <img src="icons/drag-handle.svg" width="12" height="12" alt="" />
      </div>

      <ng-template cdkDragPlaceholder>
        <div class="clip-drag-placeholder"></div>
      </ng-template>

    </div>
  }

  <label
    class="drop-zone"
    [class.dragging]="isDragging()"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <img src="icons/upload.svg" class="drop-icon" width="22" height="22" alt="" />
    <span>{{ clips().length === 0 ? 'Drop video here' : 'Add more videos' }}</span>
    <input type="file" accept="video/*" multiple (change)="onFileSelect($event)" hidden />
  </label>

</div>
