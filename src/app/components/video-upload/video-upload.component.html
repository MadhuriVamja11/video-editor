<div
  class="upload-zone"
  [class.dragging]="isDragging()"
  [class.has-clip]="clip()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
>
  @if (clip(); as c) {
    <div class="thumbnail-card">
      @if (c.thumbnail) {
        <img [src]="c.thumbnail" alt="Video thumbnail" class="thumbnail" />
        <span class="duration-badge">{{ formatTime(c.duration) }}</span>
      }
      <p class="filename">{{ c.file.name }}</p>
      <label class="replace-btn">
        Replace video
        <input type="file" accept="video/*" (change)="onFileSelect($event)" hidden />
      </label>
    </div>
  } @else {
    <div class="upload-prompt">
      <svg
        class="upload-icon"
        width="40"
        height="40"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="17 8 12 3 7 8" />
        <line x1="12" y1="3" x2="12" y2="15" />
      </svg>
      <p class="upload-text">Drag &amp; drop a video here</p>
      <p class="upload-sub">or</p>
      <label class="browse-btn">
        Browse File
        <input type="file" accept="video/*" (change)="onFileSelect($event)" hidden />
      </label>
    </div>
  }
</div>
